name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Install (no lockfile)
        if: failure()
        run: pnpm install

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
        run: pnpm db:generate

      - name: Validate schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
        run: pnpm db:validate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        env:
          DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci_build
          NEXT_PUBLIC_SUPABASE_URL: https://ci-build.invalid
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-build-supabase-anon-key
        run: pnpm build

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mileage_copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Install (no lockfile)
        if: failure()
        run: pnpm install

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
        run: pnpm db:generate

      - name: Migrate test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
        run: pnpm db:migrate:deploy

      - name: Verify schema
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
        run: pnpm db:verify-schema

      - name: Integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          INTEGRATION_TEST: '1'
        run: pnpm test:integration

  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mileage_copilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile
        continue-on-error: true

      - name: Install (no lockfile)
        if: failure()
        run: pnpm install

      - name: Generate Prisma client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
        run: pnpm db:generate

      - name: Migrate test database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
        run: pnpm db:migrate:deploy

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps
        working-directory: apps/web

      - name: Build app
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
        run: pnpm build

      - name: E2E smoke tests
        env:
          E2E_TEST: '1'
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/mileage_copilot
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.E2E_SUPABASE_SERVICE_ROLE_KEY }}
          E2E_USER_EMAIL: ${{ secrets.E2E_USER_EMAIL }}
          E2E_USER_PASSWORD: ${{ secrets.E2E_USER_PASSWORD }}
          E2E_SIGNUP_ENABLED: '1'
        run: |
          if [ -z "$E2E_USER_EMAIL" ]; then
            echo "Skipping E2E smoke tests — E2E_USER_EMAIL not configured"
            exit 0
          fi
          pnpm test:e2e:smoke
