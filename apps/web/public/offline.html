<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#2d8f7f" />
    <title>Offline — Mileage & Expense Copilot</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f0f7f6;
        --surface: #fff;
        --text: #0f172a;
        --muted: #64748b;
        --primary: #2d8f7f;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0b1220;
          --surface: #111827;
          --text: #f8fafc;
          --muted: #94a3b8;
        }
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, sans-serif;
        background: radial-gradient(ellipse 80% 50% at 50% -20%, rgba(45, 143, 127, 0.15), transparent),
          linear-gradient(180deg, var(--bg), var(--bg));
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        max-width: 22rem;
        width: 100%;
        background: var(--surface);
        border-radius: 1rem;
        padding: 1.75rem;
        text-align: center;
        box-shadow: 0 12px 24px -4px rgba(15, 23, 42, 0.12);
      }
      img {
        width: 4.5rem;
        height: 4.5rem;
        border-radius: 1rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 0.5rem;
      }
      p {
        color: var(--muted);
        line-height: 1.5;
        margin: 0 0 1.25rem;
        font-size: 0.9375rem;
      }
      button {
        appearance: none;
        border: none;
        background: var(--primary);
        color: #fff;
        font-weight: 600;
        font-size: 0.9375rem;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        cursor: pointer;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icons/icon-192.png" alt="" width="72" height="72" />
      <h1>You&apos;re offline</h1>
      <p>
        Trips and receipts you saved locally will sync when you&apos;re back online. Open the app
        from your home screen for the best field experience.
      </p>
      <button type="button" onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
